services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    networks:
      - ecommerce

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ecommerce

  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ecommerce}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - ecommerce

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ecommerce

  frontend_vue:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    container_name: ecommerce_frontend_vue
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend-vue:/app
      - /app/node_modules
    networks:
      - ecommerce

  backend_node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: ecommerce_backend_node
    restart: unless-stopped
    ports:
      - "8001:3000"
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NODE_DATABASE:-ecommerce_node}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_SYNCHRONIZE: "true"
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
      JWT_EXPIRES_IN: 7d
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    depends_on:
      - mysql
    networks:
      - ecommerce

volumes:
  mysql_data:

networks:
  ecommerce:
    driver: bridge
